version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: formsync-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-formsync}
      POSTGRES_USER: ${POSTGRES_USER:-formsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-formsync123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formsync"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - formsync-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: formsync-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-formsync}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-formsync}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-formsync123}
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: ${JWT_SECRET:-YourSuperSecretKeyForFormSyncJWTTokenGeneration2024!MustBe256BitsLong}
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:19006
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - formsync-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost:${BACKEND_PORT:-8080}
    container_name: formsync-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - formsync-net

volumes:
  pgdata:

networks:
  formsync-net:
    driver: bridge

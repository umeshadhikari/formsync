server:
  port: 8080

spring:
  application:
    name: formsync-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:formsync}
    username: ${DB_USER:formsync}
    password: ${DB_PASS:formsync123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

flowable:
  database-schema-update: true
  async-executor-activate: true
  process:
    definition-cache-limit: 100

formsync:
  jwt:
    secret: ${JWT_SECRET:YTJiM2M0ZDVlNmY3ZzhoOWkwajFrMmwzbTRuNW82cDdxOHI5czB0MXUydjN3NHg1eTZ6N2E4YjljMGQxZTJm}
    expiration-ms: 900000       # 15 minutes
    refresh-expiration-ms: 28800000  # 8 hours
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8081,http://localhost:19006}
  cbs:
    mode: stub    # stub | live
  dms:
    mode: stub    # stub | live
    storage-path: ${DMS_PATH:./dms-storage}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.formsync: DEBUG
    org.flowable: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
